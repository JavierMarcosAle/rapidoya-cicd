name: Pipeline CI/CD RápidoYa

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # FASE 2: BUILD & TEST (CI)
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Obtener el código
      uses: actions/checkout@v3

    - name: 2. Configurar entorno Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 3. Construcción (BUILD)
      run: npm run build

    - name: 4. Pruebas Automatizadas (TEST)
      run: npm test

  # FASE 3: DEPLOY (CD)
  deploy_production:
    needs: build_and_test
    if: github.ref == 'refs/heads/main' # Solo se ejecuta si los cambios entraron a 'main'
    runs-on: ubuntu-latest
    steps:
    - name: 5. Despliegue Automatizado (DEPLOY)
      run: |
        echo "Iniciando despliegue de la nueva versión de RápidoYa..."
        echo "✅ Despliegue completado con éxito en Producción."